name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS：同时构建 arm64（Apple Silicon）和 x64（Intel）──
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build renderer & main process
        run: npx vite build

      - name: Package & publish (arm64 + x64)
        run: npx electron-builder --mac --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows：x64 ──
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build renderer & main process
        run: npx vite build

      - name: Package & publish (x64)
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
